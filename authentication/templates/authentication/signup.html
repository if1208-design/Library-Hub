{% load static %}
<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Sign Up</title>

    <link rel="stylesheet"
          type="text/css"
          href="{% static 'css/signup-style.css' %}">

</head>

<body>

    <nav class="navbar">

        <a href="{% url 'home' %}" class="logo">

            <img src="{% static 'images/papyrus_hub_logo.png' %}"
                 alt="logo">

        </a>

        <div class="nav-links">

            <a href="{% url 'login' %}">
                Login
            </a>

            <a href="{% url 'signup' %}" class="active">
                Sign Up
            </a>

        </div>

    </nav>

    <div class="container">

        <h2 class="page-title">
            Create Your Account
        </h2>

        <div class="signup-box">

            <form method="POST" id="signupForm">

                {% csrf_token %}

                <div>

                    <label for="username">
                        UserName:
                    </label>

                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="UserName"
                        required
                        pattern="[A-Za-z0-9]{4,12}"
                        title="Username must be 4-12 letters or numbers"
                    >

                </div>

                <div>

                    <label for="mail">
                        Email:
                    </label>

                    <input
                        type="email"
                        id="mail"
                        name="email"
                        placeholder="E-mail"
                        required
                    >

                </div>

                <div>

                    <label for="pass">
                        Password:
                    </label>

                    <input
                        type="password"
                        id="pass"
                        name="password"
                        placeholder="Password"
                        required
                        minlength="8"
                    >

                </div>

                <div>

                    <label for="cpass">
                        Confirm Password:
                    </label>

                    <input
                        type="password"
                        id="cpass"
                        name="confirm_password"
                        placeholder="Confirm Password"
                        required
                        minlength="8"
                    >

                </div>

                <div class="Who">

                    <input
                        type="radio"
                        id="user"
                        name="role"
                        value="user"
                    >

                    <label for="user">
                        User
                    </label>

                    <input
                        type="radio"
                        id="admin"
                        name="role"
                        value="admin"
                    >

                    <label for="admin">
                        Admin
                    </label>

                </div>

                <div>

                    <label for="have">
                        Already have an Account?
                    </label>

                    <a href="{% url 'login' %}" id="have">
                        Press here to LogIn
                    </a>

                </div>

                {% if error %}

                    <p class="error-message">
                        {{ error }}
                    </p>

                {% endif %}

                <button type="submit">
                    Register
                </button>

            </form>

        </div>

    </div>

    <script src="{% static 'js/signup.js' %}"></script>

</body>

</html>
