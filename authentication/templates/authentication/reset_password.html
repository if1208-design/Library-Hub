{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password</title>

    <link rel="stylesheet"
          href="{% static 'authentication/css/reset-password-style.css' %}">
</head>

<body>

    <div class="container">

        <div class="reset-box">

            <h2>Reset Password</h2>

            <form method="POST">

                {% csrf_token %}

                <label>Email</label>
                <input type="email"
                       name="email"
                       placeholder="Enter your email"
                       required>

                <label>Verification Code</label>
                <input type="text"
                       name="code"
                       placeholder="Enter code"
                       required>

                <label>New Password</label>
                <input type="password"
                       name="password"
                       placeholder="New password"
                       required>

                <label>Confirm Password</label>
                <input type="password"
                       name="confirm_password"
                       placeholder="Confirm password"
                       required>

                <button type="submit">
                    Reset Password
                </button>

            </form>

            <p>
                Remember your password?
                <a href="{% url 'login' %}">
                    Login
                </a>
            </p>

            {% if error %}
                <p class="error">
                    {{ error }}
                </p>
            {% endif %}

            {% if success %}
                <p class="success">
                    {{ success }}
                </p>
            {% endif %}

        </div>

    </div>

<script src="{% static 'authentication/js/reset_password.js' %}"></script>

</body>
</html>
