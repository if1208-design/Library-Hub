{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Details</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
    <nav>
        <div class="logo-container">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/papyrus_hub_logo.png' %}" alt="Logo" class="site-logo">
            </a>
        </div>

        <div class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'borrowed_books' %}">Borrowed Books</a>
        </div>
    </nav>
</header>

<div class="book-container">

    <div class="book-left">
        <img id="bookImg" src="{% static 'images/default-book.png' %}" alt="Book Cover">
    </div>

    <div class="book-right">
        <h1 id="bookName">Loading...</h1>

        <p class="author">
            By: <span id="bookAuthor"></span>
        </p>

        <div class="info-grid">
            <p><strong>ID:</strong> <span id="bookIdDisplay"></span></p>
            <p><strong>Category:</strong> <span id="bookCategory"></span></p>
            <p><strong>Price:</strong> <span id="bookPrice"></span></p>
            <p><strong>Borrowing Fee:</strong> <span id="bookBorrowFee"></span></p>
        </div>

        <div class="description-box">
            <strong>Description:</strong>
            <p id="bookDescription"></p>
        </div>

        <div class="btns">
            <button id="borrow-btn" onclick="handleBorrow()">Borrow Now</button>
            <button id="buy-btn" onclick="handleBuy()">Buy Now</button>
        </div>
    </div>

</div>

<footer>
    &copy; 2026 Papyrus Hub - Where Knowledge Lives
</footer>

<script src="{% static 'js/script.js' %}"></script>

</body>
</html>
