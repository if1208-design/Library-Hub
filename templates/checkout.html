{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Papyrus Hub</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>
    <nav>
        <div class="logo-container">
            <a href="{% url 'home' %}">
                <img src="{% static 'images/papyrus_hub_logo.png' %}" class="site-logo">
            </a>
        </div>
        <div class="nav-links">
            <a href="{% url 'home' %}">← Back to Home</a>
        </div>
    </nav>
</header>

<div style="max-width: 500px; margin: 60px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">

    <h2 style="color: #2D1B0D; margin-bottom: 20px;">Secure Checkout</h2>

    <div id="summary" style="background: #E8D5B5; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #B08D57;">
        <p>Loading order summary...</p>
    </div>

    <form id="paymentForm">
        <input type="text" placeholder="Cardholder Name" required
               style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">

        <input type="text" placeholder="Card Number (XXXX XXXX XXXX XXXX)" required
               style="width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:8px;">

        <div style="display:flex; gap:10px;">
            <input type="text" placeholder="MM/YY" required
                   style="width:50%; padding:12px; border:1px solid #ddd; border-radius:8px;">
            <input type="text" placeholder="CVV" required
                   style="width:50%; padding:12px; border:1px solid #ddd; border-radius:8px;">
        </div>

        <button type="submit" style="width:100%; margin-top:20px; background:#B08D57; color:white; padding:12px; border:none; border-radius:8px; cursor:pointer; font-size:16px;">
            Pay Now
        </button>
    </form>
</div>

<script>
    // Check if this is a single book Buy Now purchase
    const urlParams = new URLSearchParams(window.location.search);
    const isSingle = urlParams.get('single') === 'true';
    const singleTitle = urlParams.get('title');
    const singlePrice = urlParams.get('price');
    const singleId = urlParams.get('book_id');

    function displayCheckoutSummary() {
        let total = 0;
        let itemsHtml = '';

        if (isSingle && singleTitle && singlePrice) {
            // ── Buy Now — show only this one book ──
            const price = parseFloat(singlePrice);
            total = price;
            itemsHtml = `<p><strong>${singleTitle}</strong> (Buy): ${price.toFixed(2)} EGP</p>`;
        } else {
            // ── Cart checkout — show all cart items ──
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];

            if (cartItems.length === 0) {
                document.getElementById('summary').innerHTML = 
                    '<p>Your cart is empty. <a href="/">Continue Shopping</a></p>';
                return;
            }

            for (let i = 0; i < cartItems.length; i++) {
                const item = cartItems[i];
                const price = parseFloat(item.price);
                total += price;
                itemsHtml += `<p><strong>${item.title}</strong> (${item.type === 'borrow' ? 'Borrow' : 'Buy'}): ${price.toFixed(2)} EGP</p>`;
            }
        }

        document.getElementById('summary').innerHTML = `
            <h4 style="margin-bottom:10px;">Order Summary</h4>
            ${itemsHtml}
            <hr style="margin:10px 0; border-color:#B08D57;">
            <strong>Total: ${total.toFixed(2)} EGP</strong>
        `;
    }

    displayCheckoutSummary();

    // Handle payment
    document.getElementById('paymentForm').addEventListener('submit', function(e) {
        e.preventDefault();

        if (!isSingle) {
            // clear cart only if it was a cart checkout
            localStorage.removeItem('cart');
        }

        alert('Purchase Successful! Thank you for shopping at Papyrus Hub. 🎉');
        window.location.href = '/';
    });
</script>

</body>
</html>
